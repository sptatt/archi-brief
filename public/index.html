<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARCHI — 건축학도를 위한 매일의 브리프</title>

<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARCHI">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --paper:#FDFCF8;          /* warm drafting paper (lightened) */
    --paper-2:#F5F2EA;
    --card:#FFFFFF;
    --ink:#0A0A0A;             /* drawing ink */
    --ink-2:#1A1A1A;
    --muted:#5A554E;
    --faint:#9F9A91;
    --hair:#E2DDCD;            /* hairline rule */
    --hair-soft:#E8E3D5;
    --grid:#F2EDDC;            /* dot grid */
    --tag-bg:#EFEBDF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:13.5px;line-height:1.65;letter-spacing:-0.005em;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle, var(--grid) 0.8px, transparent 1.2px);
    background-size:24px 24px;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  input,select{font-family:inherit;font-size:inherit;color:inherit}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:0;font-feature-settings:"tnum" 1}

  /* ===== Topbar ===== */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(253,252,248,0.92);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--hair);
  }
  .topbar-inner{
    max-width:1180px;margin:0 auto;
    padding:14px 36px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand-mark{
    font-weight:700;font-size:14px;letter-spacing:0.22em;
  }
  .brand-divider{width:1px;height:14px;background:var(--hair);display:inline-block}
  .brand-tag{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10.5px;color:var(--muted);letter-spacing:0.1em;
  }
  .nav{display:flex;gap:0;border:1px solid var(--hair);border-radius:999px;padding:3px;background:rgba(255,255,255,0.5)}
  .nav button{
    padding:6px 14px;font-size:12px;color:var(--muted);
    border-radius:999px;transition:color .15s, background .15s;
    letter-spacing:-0.005em;
  }
  .nav button:hover{color:var(--ink)}
  .nav button.active{color:#fff;background:var(--ink)}

  /* ===== Sheet (drawing frame) ===== */
  .container{
    max-width:1180px;margin:0 auto;
    padding:36px 36px 24px;
  }
  .sheet{
    position:relative;
    background:transparent;
    padding:32px 0 12px;
  }
  /* sheet frame (subtle hairline border around the page content) */
  .sheet::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    border:1px solid var(--hair);
    background:
      /* corner crosshair top-left */
      linear-gradient(var(--ink),var(--ink)) 12px 12px / 12px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) 12px 12px / 1px 12px no-repeat,
      /* top-right */
      linear-gradient(var(--ink),var(--ink)) calc(100% - 12px) 12px / 12px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) calc(100% - 13px) 12px / 1px 12px no-repeat,
      /* bottom-left */
      linear-gradient(var(--ink),var(--ink)) 12px calc(100% - 12px) / 12px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) 12px calc(100% - 24px) / 1px 12px no-repeat,
      /* bottom-right */
      linear-gradient(var(--ink),var(--ink)) calc(100% - 12px) calc(100% - 12px) / 12px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) calc(100% - 13px) calc(100% - 24px) / 1px 12px no-repeat;
  }
  .sheet-inner{padding:20px 40px 30px;position:relative}

  /* ===== Drawing-sheet eyebrow ===== */
  .eyebrow{
    display:flex;align-items:center;gap:14px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--ink);font-weight:600;
    margin-bottom:14px;
  }
  .eyebrow .num{font-weight:600}
  .eyebrow .rule{flex:0 0 32px;height:1px;background:var(--ink);display:inline-block}
  .eyebrow .label{color:var(--muted);font-weight:500}
  .eyebrow .meta{
    margin-left:auto;color:var(--faint);font-size:10px;letter-spacing:0.1em;font-weight:500;
  }

  /* ===== Type ===== */
  .h1{font-size:46px;line-height:1.05;letter-spacing:-0.035em;font-weight:600}
  .h2{font-size:30px;line-height:1.15;letter-spacing:-0.025em;font-weight:600}
  .h3{font-size:15px;font-weight:600;letter-spacing:-0.01em}
  .p-lead{font-size:15px;color:var(--muted);line-height:1.6;letter-spacing:-0.01em}
  .muted{color:var(--muted)}
  .faint{color:var(--faint)}
  .row{display:flex;align-items:center;gap:12px}

  /* ===== Buttons / inputs ===== */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    height:44px;padding:0 22px;border-radius:4px;
    background:var(--ink);color:#fff;
    font-size:13px;font-weight:600;letter-spacing:-0.005em;
    transition:background .15s, transform .05s;
  }
  .btn:hover{background:#000}
  .btn:active{transform:translateY(1px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--hair)}
  .btn-ghost:hover{background:rgba(0,0,0,0.04);border-color:var(--ink-2)}
  .btn-sm{height:32px;padding:0 14px;font-size:12px;border-radius:3px}

  .input{
    height:46px;width:100%;padding:0 16px;
    border:1px solid var(--hair);border-radius:4px;background:#fff;
    font-size:14px;transition:border-color .15s;
  }
  .input:focus{outline:none;border-color:var(--ink)}

  .tag{
    display:inline-block;font-size:10.5px;letter-spacing:0.04em;
    padding:3px 8px;border-radius:2px;background:var(--tag-bg);color:var(--muted);
  }

  /* ===== Onboarding ===== */
  .onboard-hero{padding:56px 0 36px;border-bottom:1px solid var(--hair);margin-bottom:40px}
  .onboard-hero .h1{max-width:760px}
  .onboard-hero .p-lead{margin-top:18px;max-width:560px}
  .form-block{margin-bottom:36px}
  .form-label{
    font-size:11px;font-weight:600;margin-bottom:12px;display:block;
    font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);
  }
  .form-help{font-size:11.5px;color:var(--faint);margin-top:8px;letter-spacing:-0.005em}

  .cat-grid{
    display:grid;grid-template-columns:repeat(2,1fr);
    border:1px solid var(--hair);border-radius:6px;background:#fff;overflow:hidden;
  }
  .cat-item{
    display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;
    border-bottom:1px solid var(--hair);transition:background .12s;
    position:relative;
  }
  .cat-item:nth-last-child(-n+2){border-bottom:none}
  .cat-item:nth-child(odd){border-right:1px solid var(--hair)}
  .cat-item:hover{background:#FCFAF5}
  .cat-item.checked{background:#FCFAF5}
  .cat-num{
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;
    color:var(--faint);min-width:18px;letter-spacing:0.04em;
  }
  .checkbox{
    width:16px;height:16px;border:1.2px solid #BCB6A6;border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .12s;background:#fff;
  }
  .cat-item.checked .checkbox{background:var(--ink);border-color:var(--ink)}
  .checkbox svg{opacity:0;transition:opacity .12s}
  .cat-item.checked .checkbox svg{opacity:1}
  .cat-name{font-size:13.5px;font-weight:500;letter-spacing:-0.01em}
  .cat-desc{font-size:11.5px;color:var(--faint);margin-top:1px}

  /* ===== Today / Home ===== */
  .today-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}

  /* On-demand action bar — clean drafting strip */
  .now-bar{
    margin:0 0 32px;background:#fff;
    border:1px solid var(--ink);border-radius:4px;
    display:grid;grid-template-columns:auto 1fr auto;align-items:stretch;overflow:hidden;
  }
  .now-bar .now-tag{
    background:var(--ink);color:#fff;
    padding:0 18px;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10.5px;letter-spacing:0.18em;display:flex;align-items:center;
  }
  .now-bar .now-mid{
    padding:14px 20px;display:flex;flex-direction:column;justify-content:center;
    border-right:1px dashed var(--hair);
  }
  .now-bar .now-mid .lead{font-size:13.5px;font-weight:600}
  .now-bar .now-mid .sub{font-size:11.5px;color:var(--faint);margin-top:2px}
  .now-bar .now-cta{
    display:flex;align-items:center;padding:0 20px;gap:10px;cursor:pointer;
    background:#fff;transition:background .12s;border-left:1px solid var(--hair);
  }
  .now-bar .now-cta:hover{background:#FCFAF5}
  .now-bar .now-opts{
    display:flex;gap:6px;padding:12px 16px;align-items:center;border-left:1px solid var(--hair);
  }
  .now-btn{
    padding:8px 14px;border:1px solid var(--hair);border-radius:4px;background:#fff;
    font-size:12px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit;
    transition:all .12s;letter-spacing:-0.005em;
  }
  .now-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .now-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .now-btn.primary:hover{opacity:0.85}
  .now-bar .now-cta .arrow{
    width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;
  }
  .now-bar .now-cta .label{font-size:12.5px;font-weight:600}

  /* Digest cards: detail-callout style */
  .digest-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .digest-card{
    position:relative;background:var(--card);
    border:1px solid var(--hair);border-radius:4px;
    padding:0;display:flex;flex-direction:column;
    transition:border-color .15s;
  }
  .digest-card:hover{border-color:var(--ink-2)}
  .digest-card-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid var(--hair);
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10px;letter-spacing:0.14em;color:var(--muted);
  }
  .digest-card-bar .dtl{color:var(--ink);font-weight:600}
  .digest-card-head{padding:18px 22px 14px}
  .digest-time{font-size:10px;letter-spacing:0.16em;color:var(--faint);text-transform:uppercase;font-family:ui-monospace,Menlo,Consolas,monospace}
  .digest-title{font-size:18px;font-weight:600;letter-spacing:-0.015em;margin-top:4px}
  .news-list{list-style:none;margin:0;padding:0 22px;flex:1}
  .news-item{
    padding:12px 0;border-top:1px solid var(--hair-soft);cursor:pointer;
    display:flex;gap:14px;
  }
  .news-item:first-child{border-top:1px solid var(--hair)}
  .news-num{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;color:var(--faint);min-width:22px;padding-top:3px;letter-spacing:0.05em}
  .news-content{flex:1;min-width:0}
  .news-headline{font-size:13.5px;font-weight:500;line-height:1.45;margin-bottom:5px;letter-spacing:-0.01em}
  .news-meta{font-size:10.5px;color:var(--faint);display:flex;gap:8px;align-items:center;letter-spacing:0}
  .news-meta .dot{width:2px;height:2px;background:#BBB6A8;border-radius:50%}
  .digest-cta{padding:14px 22px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center}
  .open-mail{font-size:11.5px;font-weight:600;color:var(--ink);font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:0.06em}

  /* ===== Archive ===== */
  .archive-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  .search-input{flex:1;min-width:240px;height:40px;padding:0 14px;border:1px solid var(--hair);border-radius:3px;background:#fff}
  .search-input:focus{outline:none;border-color:var(--ink)}
  .filter-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
  .chip{
    font-size:11.5px;padding:6px 11px;border:1px solid var(--hair);border-radius:999px;
    background:#fff;color:var(--muted);cursor:pointer;transition:all .12s;letter-spacing:-0.005em;
  }
  .chip:hover{border-color:var(--ink-2);color:var(--ink)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .archive-month{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink);
    margin:30px 0 8px;padding-bottom:10px;border-bottom:1px solid var(--ink);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .archive-month .count{color:var(--faint);font-size:10px}
  .archive-row{
    display:grid;grid-template-columns:80px 80px 1fr auto;gap:18px;align-items:center;
    padding:14px 4px;border-bottom:1px solid var(--hair-soft);cursor:pointer;
    transition:background .1s;
  }
  .archive-row:hover{background:#FCFAF5}
  .archive-no{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;color:var(--faint);letter-spacing:0.04em}
  .archive-slot{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--hair);border-radius:2px;
    color:var(--muted);text-align:center;
  }
  .archive-slot.kr{border-color:var(--ink);color:var(--ink)}
  .archive-slot.now{border-color:var(--ink);background:var(--ink);color:#fff}
  .archive-summary{font-size:13px;color:var(--ink);line-height:1.5;letter-spacing:-0.01em}
  .archive-cats{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:240px}

  /* ===== Settings ===== */
  .settings-section{
    border:1px solid var(--hair);border-radius:4px;background:#fff;
    padding:0;margin-bottom:18px;
  }
  .settings-section-head{
    padding:14px 22px;border-bottom:1px solid var(--hair);
    display:flex;align-items:center;justify-content:space-between;
  }
  .settings-section-head .num{
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;
    color:var(--faint);letter-spacing:0.14em;
  }
  .settings-section-body{padding:6px 22px}
  .settings-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-bottom:1px solid var(--hair-soft);gap:16px;
  }
  .settings-row:last-child{border-bottom:none}
  .settings-row .label-block{flex:1}
  .settings-label{font-size:13.5px;font-weight:500;letter-spacing:-0.01em}
  .settings-desc{font-size:11.5px;color:var(--faint);margin-top:2px}
  .toggle{
    width:38px;height:22px;background:#D8D2C2;border-radius:999px;position:relative;
    cursor:pointer;transition:background .15s;flex-shrink:0;
  }
  .toggle::after{
    content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;
    background:#fff;border-radius:50%;transition:left .15s;
    box-shadow:0 1px 2px rgba(0,0,0,0.15);
  }
  .toggle.on{background:var(--ink)}
  .toggle.on::after{left:19px}
  .time-input{
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;
    padding:6px 10px;border:1px solid var(--hair);border-radius:3px;background:#fff;
    color:var(--ink);
    accent-color:var(--ink);
    color-scheme:light;
  }
  .time-input:focus{outline:none;border-color:var(--ink)}
  .time-input::selection{background:var(--ink);color:#fff}
  .time-input::-webkit-datetime-edit-hour-field:focus,
  .time-input::-webkit-datetime-edit-minute-field:focus,
  .time-input::-webkit-datetime-edit-second-field:focus,
  .time-input::-webkit-datetime-edit-ampm-field:focus{
    background:var(--ink);color:#fff;outline:none;border-radius:2px;
  }
  .time-input::-webkit-calendar-picker-indicator{
    filter:grayscale(1) brightness(0.4);cursor:pointer;opacity:0.6;
  }
  .time-input::-webkit-calendar-picker-indicator:hover{opacity:1}

  /* ===== Sheet footer (scale ruler + title block) ===== */
  .sheet-foot{
    margin-top:48px;padding-top:24px;border-top:1px solid var(--ink);
    display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;
  }
  .scale-ruler{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:9.5px;color:var(--muted);letter-spacing:0.04em;
  }
  .scale-ruler-bar{
    height:10px;width:240px;position:relative;
    border-bottom:1px solid var(--ink);margin:0 0 4px;
    background:repeating-linear-gradient(to right,
      var(--ink) 0, var(--ink) 1px, transparent 1px, transparent 24px);
  }
  .scale-ruler-bar::after{
    content:'';position:absolute;right:0;top:0;width:1px;height:100%;background:var(--ink);
  }
  .scale-ruler-labels{display:flex;justify-content:space-between;width:240px;font-size:9px;color:var(--faint)}
  .title-block-foot{
    border:1px solid var(--ink);font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:9.5px;display:grid;grid-template-columns:auto auto;
    background:#fff;
  }
  .title-block-foot .k{padding:5px 9px;border-bottom:1px solid var(--hair);background:#FBF9F2;color:var(--faint);text-align:right;letter-spacing:0.06em}
  .title-block-foot .v{padding:5px 11px;border-bottom:1px solid var(--hair);border-left:1px solid var(--hair);color:var(--ink)}
  .title-block-foot > div:nth-last-child(-n+2){border-bottom:none}

  /* ===== Bottom nav (mobile) ===== */
  .bottom-nav{
    display:none;position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:rgba(253,252,248,0.96);backdrop-filter:saturate(180%) blur(14px);
    border-top:1px solid var(--hair);
    padding:8px 8px max(8px,env(safe-area-inset-bottom));
    grid-template-columns:1fr 1fr 1fr;gap:4px;
  }
  .bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:6px;color:var(--faint);font-size:10.5px;font-weight:500}
  .bottom-nav button.active{color:var(--ink)}
  .bottom-nav .icon{width:20px;height:20px;display:block}

  /* ===== Email modal ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(10,10,10,0.55);z-index:100;
    display:none;align-items:flex-start;justify-content:center;padding:48px 16px;
    overflow-y:auto;
  }
  .modal-overlay.show{display:flex}
  .mail-frame{
    background:#fff;border-radius:6px;width:100%;max-width:660px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25);overflow:hidden;
  }
  .mail-header{
    padding:14px 22px;border-bottom:1px solid var(--hair);
    display:flex;justify-content:space-between;align-items:center;
    background:#FBF9F2;
  }
  .mail-from{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--muted)}
  .mail-from strong{color:var(--ink);font-weight:600}
  .mail-close{width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .mail-body{padding:36px 36px 24px}
  .mail-brand{

/* ============ State ============ */
const STORE = 'archi_brief_v2';
const defaultState = ()=>({ user:null, profile:null, archive:[], view:'login' });
let state = loadState();

function loadState(){
  return defaultState();
}
async function hydrateFromSupabase(){
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    state.user = null; state.profile = null; state.archive = [];
    if (state.view !== 'signup') state.view = 'login';
    render(); return;
  }
  let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  if (!profile) {
    await supabase.from('profiles').insert({ id: user.id, name: user.user_metadata?.name || '' });
    const r = await supabase.from('profiles').select('*').eq('id', user.id).single();
    profile = r.data;
  }
  state.profile = profile;
  state.user = {
    id: user.id, email: user.email,
    name: profile?.name || user.user_metadata?.name || '',
    categories: profile?.categories || [],
    times: {
      morning: (profile?.send_morning || '09:00:00').slice(0,5),
      evening: (profile?.send_evening || '18:00:00').slice(0,5),
    },
    paused: !!profile?.paused,
    since: profile?.created_at || user.created_at,
  };
  const { data: digests } = await supabase.from('digests').select('*').order('sent_at', { ascending:false }).limit(60);
  state.archive = (digests||[]).map(d => ({
    date: new Date(d.sent_at),
    region: d.region || (d.slot === 'morning' ? 'kr' : d.slot === 'evening' ? 'int' : 'now'),
    time: new Date(d.sent_at).toTimeString().slice(0,5),
    items: d.items || [],
  }));
  const { data: krNews } = await supabase.from('news_items').select('*').eq('region','kr').order('published_at',{ascending:false}).limit(80);
  const { data: intNews } = await supabase.from('news_items').select('*').eq('region','int').order('published_at',{ascending:false}).limit(80);
  state.todayKr = krNews || [];
  state.todayInt = intNews || [];

  if (!state.user.categories.length) state.view = 'select-cats';
  else if (state.view === 'login' || state.view === 'signup' || state.view === 'verify') state.view = 'home';
  render();
}
async function saveState(){
  if (!state.user) return;
  const updates = {
    name: state.user.name,
    categories: state.user.categories,
    send_morning: (state.user.times.morning || '09:00') + ':00',
    send_evening: (state.user.times.evening || '18:00') + ':00',
    paused: !!state.user.paused,
  };
  const { error } = await supabase.from('profiles').update(updates).eq('id', state.user.id);
  if (error) console.error('saveState:', error);
}

/* ============ Utils ============ */
const $ = (s,r=document)=>r.querySelector(s);
function el(tag, attrs={}, ...children){
  const n = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==='class') n.className=v;
    else if(k==='html') n.innerHTML=v;
    else if(k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), v);
    else n.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false) continue;
    if(typeof c==='string'||typeof c==='number') n.appendChild(document.createTextNode(String(c)));
    else n.appendChild(c);
  }
  return n;
}
function catName(id){ const c = CATEGORIES.find(x=>x.id===id); return c?c.name:id; }
function itemCat(it){ return it.category || it.cat; }
function toast(msg){

  clearTimeout(window.__t); window.__t = setTimeout(()=>t.classList.remove('show'), 1800);
}
function pad(n,w=2){ return String(n).padStart(w,'0'); }
function fmtDate(d){ return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`; }
function fmtDateLong(d){
  const dow = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${dow})`;
}
function fmtMonth(d){ return `${d.getFullYear()} · ${pad(d.getMonth()+1)}`; }
function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function sheetNoFor(d, slot){
  const base = String((d.getMonth()+1)*100 + d.getDate()).padStart(4,'0');
  const suf = slot==='kr'?'KR':slot==='int'?'IN':'ND';
  return `A-${base}-${suf}`;
}
function pickItems(pool, seed, n=5){
  let s = seed; const out = []; const used = new Set();
  while(out.length < n && used.size < pool.length){
    s = (s*9301 + 49297) % 233280;
    const i = Math.floor((s/233280)*pool.length);
    if(!used.has(i)){ used.add(i); out.push(pool[i]); }
  }
  return out;
}
function categoryFiltered(pool){ return pool.filter(x=> state.user.categories.includes(x.cat)); }

async function sendNow(slot){
  slot = slot || 'mix';
  if (!state.user) { toast('로그인이 필요합니다'); return; }
  if ((state.user.categories||[]).length === 0) { toast('구독 분야를 1개 이상 선택해주세요'); return; }
  toast('발송 중...');
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { toast('세션 만료. 다시 로그인'); return; }
    const r = await fetch('/api/digest-now?slot=' + slot, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + session.access_token }
    });
    const j = await r.json();
    if (j.ok && j.sent > 0) {
      const tag = (j.kr !== undefined) ? ` (국내 ${j.kr}, 해외 ${j.int})` : '';
      toast('메일 발송됐어요' + tag);
      await hydrateFromSupabase();
    } else if (j.ok && j.sent === 0) toast('해당 분야의 새 기사가 없어요');
    else toast(j.error || '발송 실패');
  } catch (e) { toast('발송 실패: ' + e.message); }
}

      return i;
    })(),
    el('button',{class:'btn-sm btn-ghost btn', onclick:()=>{
      if(confirm('아카이브를 전부 비우시겠어요?')){ state.archive=[]; saveState(); render(); toast('아카이브를 비웠어요'); }
    }}, '비우기')
  );
  wrap.appendChild(tools);

  const chips = el('div',{class:'filter-chips'});
  const allChip = el('button',{class:'chip active', onclick:()=>{
    queryState.cat=null; chips.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    allChip.classList.add('active'); renderList();
  }}, '전체');
  chips.appendChild(allChip);
  state.user.categories.forEach(cid=>{
    const c = CATEGORIES.find(x=>x.id===cid); if(!c) return;
    const ch = el('button',{class:'chip', onclick:()=>{
      queryState.cat=cid; chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      ch.classList.add('active'); renderList();
    }}, c.name);
    chips.appendChild(ch);
  });
  wrap.appendChild(chips);

  const listWrap = el('div'); wrap.appendChild(listWrap);

  function renderList(){
    listWrap.innerHTML='';
    const filtered = state.archive.map(d=>{
      let items = d.items;
      if(queryState.cat) items = items.filter(it=>itemCat(it)===queryState.cat);
      if(queryState.q) items = items.filter(it=> (it.title+' '+it.excerpt+' '+it.src).toLowerCase().includes(queryState.q));
      return {...d, items};
    }).filter(d=>d.items.length>0);

    if(filtered.length===0){
      listWrap.appendChild(el('div',{class:'empty'}, el('p',{},'조건에 맞는 브리프가 없어요.')));
      return;
    }
    const monthCounts = {};
    filtered.forEach(d=>{ const m=fmtMonth(d.date); monthCounts[m]=(monthCounts[m]||0)+1; });

    filtered.forEach(d=>{
      const m = fmtMonth(d.date);

          el('span',{}, m),
          el('span',{class:'count'}, `${pad(monthCounts[m],2)} ITEMS`)

      const cats = el('div',{class:'archive-cats'});

      })},
        el('div',{class:'archive-no mono'}, sn),
        el('div',{class:slotClass}, slotLabel),
        el('div',{class:'archive-summary'}, summary),
        cats
      ));
    });
  }
  renderList();
  wrap.appendChild(sheetFoot({sheetNo:'A-ARC-' + pad(state.archive.length,3), title:'ARCHIVE'}));
  return wrap;
}

function fillSample(){
  const out = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<14;i++){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const seed = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
    const krF = categoryFiltered(SAMPLE_KR);
    const inF = categoryFiltered(SAMPLE_INT);
    const dKr = new Date(d); dKr.setHours(9,0,0,0);
    const dIn = new Date(d); dIn.setHours(18,0,0,0);
    if(krF.length) out.push({date:dKr, region:'kr', time:'09:00', items:pickItems(krF, seed+1), demo:true});
    if(inF.length) out.push({date:dIn, region:'int', time:'18:00', items:pickItems(inF, seed+2), demo:true});
  }
  state.archive = [...out, ...state.archive];
  saveState(); render();
  toast(`샘플 ${pad(out.length)}건이 채워졌어요`);
}

  ));
  sDB.appendChild(el('div',{class:'settings-row'},

      el('div',{class:'settings-desc'}, '모든 구독 정보와 아카이브가 삭제됩니다')
    ),
    el('button',{class:'btn-sm btn-ghost btn', onclick:async ()=>{

// 비밀번호 재설정 링크 클릭 감지 — URL에 recovery 표시가 있으면 강제로 reset-pw 화면
const _u = location.hash + location.search;
if (_u.includes('type=recovery') || _u.includes('recovery=1') || _u.includes('code=')) {
  state.recovering = true;
  state.view = 'reset-pw';
}

render();

supabase.auth.onAuthStateChange((event, session) => {
  console.log('[auth]', event);
  if (event === 'PASSWORD_RECOVERY') {
    state.recovering = true;
    state.view = 'reset-pw';
    render();
    return;
  }
  if (event === 'SIGNED_OUT') {
    state.recovering = false;
    state.view = 'login';
    render();
    return;
  }
  if (state.recovering) {
    state.view = 'reset-pw';
    render();
    return;
  }
  hydrateFromSupabase();
});

function viewSignup(){
  const wrap = el('div',{class:'auth-wrap'});
  const card = el('div',{class:'auth-card'});
  card.appendChild(el('div',{class:'auth-brand'},'ARCHI · DAILY BRIEF'));
  card.appendChild(el('div',{class:'auth-title'},'회원가입'));
  card.appendChild(el('div',{class:'auth-sub'},'이메일과 비밀번호로 계정을 만듭니다.'));

  const nameIn = el('input',{type:'text',required:'',placeholder:'이름 또는 닉네임',maxlength:'30'});
  const emailIn = el('input',{type:'email',required:'',autocomplete:'email',placeholder:'you@example.com'});
  const pwIn = el('input',{type:'password',required:'',autocomplete:'new-password',placeholder:'8자 이상',minlength:'8'});
  const pwIn2 = el('input',{type:'password',required:'',autocomplete:'new-password',placeholder:'비밀번호 확인',minlength:'8'});

  const form = el('form',{onsubmit:async (e)=>{
    e.preventDefault();
    const name = nameIn.value.trim();
    const email = emailIn.value.trim().toLowerCase();
    const pw = pwIn.value;
    const pw2 = pwIn2.value;
    if(name.length<1){ toast('이름을 입력해주세요'); return; }
    if(!/^\S+@\S+\.\S+$/.test(email)){ toast('이메일 형식을 확인해주세요'); return; }
    if(pw.length<8){ toast('비밀번호는 8자 이상'); return; }
    if(pw !== pw2){ toast('비밀번호가 일치하지 않아요'); return; }
    const { error } = await supabase.auth.signUp({
      email, password: pw,
      options: { data: { name }, emailRedirectTo: location.origin }
    });
    if (error) { toast(error.message || '가입 실패'); return; }
    toast('인증 메일을 보냈어요. 메일함의 링크를 클릭하세요.');
  }});

  form.appendChild(el('div',{class:'field'}, el('label',{},'NAME'), nameIn));
  form.appendChild(el('div',{class:'field'}, el('label',{},'EMAIL'), emailIn));
  form.appendChild(el('div',{class:'field'}, el('label',{},'PASSWORD'), pwIn));
  form.appendChild(el('div',{class:'field'}, el('label',{},'CONFIRM'), pwIn2));
  form.appendChild(el('div',{class:'auth-cta'},
    el('button',{class:'btn',type:'submit'},'인증 코드 받기  →')
  ));
  card.appendChild(form);

  card.appendChild(el('div',{class:'auth-links'},
    el('span',{class:'faint'},'이미 계정이 있나요?'),
    el('a',{onclick:()=>{ state.view='login'; render(); }},'로그인')
  ));
  wrap.appendChild(card);
  return wrap;
}

function viewVerify(){
  const wrap = el('div',{class:'auth-wrap'});
  const card = el('div',{class:'auth-card'});
  const pv = state.pendingVerification;
  card.appendChild(el('div',{class:'auth-brand'},'ARCHI · DAILY BRIEF'));
  card.appendChild(el('div',{class:'auth-title'},'이메일 인증'));
  card.appendChild(el('div',{class:'auth-sub'},
    (pv && pv.email ? pv.email : '') + ' 으로 보낸 6자리 인증 코드를 입력하세요.'
  ));

  const codeIn = el('input',{class:'code-input',type:'text',inputmode:'numeric',maxlength:'6',placeholder:'••••••',autocomplete:'one-time-code'});
  setTimeout(()=>codeIn.focus(),50);

  const form = el('form',{onsubmit:e=>{
    e.preventDefault();
    const code = codeIn.value.trim();
    const pv = state.pendingVerification;
    if(!pv){ toast('인증 정보가 만료됐어요'); state.view='login'; render(); return; }
    if(code !== pv.code){ toast('인증 코드가 올바르지 않아요'); return; }
    state.accounts[pv.email] = {
      name: pv.name, password: pv.password,
      categories: [], times: {morning:'09:00', evening:'18:00'},
      paused: false, since: new Date().toISOString(),
      verified: true, archive: [],
    };
    state.session = pv.email;
    state.user = {email:pv.email, name:pv.name, categories:[], times:{morning:'09:00',evening:'18:00'}, paused:false, since:state.accounts[pv.email].since};
    state.archive = [];
    state.pendingVerification = null;
    state.view = 'select-cats';
    saveState(); render(); toast('인증 완료 — 환영해요');
  }});
  form.appendChild(el('div',{class:'field'},
    el('label',{},'VERIFICATION CODE'),
    codeIn
  ));
  form.appendChild(el('div',{class:'auth-cta'},
    el('button',{class:'btn',type:'submit'},'인증 완료')
  ));
  card.appendChild(form);

  card.appendChild(el('div',{class:'auth-note'},
    '[DEMO] 백엔드가 없어서 실제 메일은 발송되지 않아요.',el('br',{}),
    '인증 코드는 아래에 표시됩니다 (Stage 5 백엔드에서 진짜 메일로 발송):',
    el('span',{class:'code'}, pv && pv.code ? pv.code : '------')
  ));

  card.appendChild(el('div',{class:'auth-links'},
    el('a',{onclick:()=>{ state.view='signup'; state.pendingVerification=null; render(); }},'← 가입으로 돌아가기'),
    el('a',{onclick:()=>{
      if(state.pendingVerification){
        state.pendingVerification.code = String(Math.floor(100000+Math.random()*900000));
        render(); toast('새 인증 코드가 발급됐어요');
      }
    }},'코드 재발급')
  ));
  wrap.appendChild(card);
  return wrap;
}

function viewSelectCats(){
  const wrap = el('div');
  const selected = new Set(state.user.categories || []);
  const countEl = el('div',{class:'faint mono', style:'font-size:11px;letter-spacing:0.08em'},`SELECTED · ${pad(selected.size)} / ${pad(CATEGORIES.length)}`);

  wrap.appendChild(el('div',{class:'onboard-hero'},
    el('div',{class:'eyebrow'},
      el('span',{class:'num'},'00'),
      el('span',{class:'rule'}),
      el('span',{class:'label'},'WELCOME · 분야 선택')
    ),
    el('h1',{class:'h1'},
      `환영합니다, ${state.user.name || ''}님.`, el('br',{}),
      '관심 분야를 골라주세요.'
    ),
    el('p',{class:'p-lead'},'선택한 분야의 소식만 큐레이션해서 보내드립니다. 설정에서 언제든 변경할 수 있어요.')
  ));

  const grid = el('div',{class:'cat-grid'});
  CATEGORIES.forEach((c,i)=>{
    const item = el('div',{class:'cat-item' + (selected.has(c.id)?' checked':''), onclick:()=>{
      if(selected.has(c.id)){ selected.delete(c.id); item.classList.remove('checked'); }
      else { selected.add(c.id); item.classList.add('checked'); }
      countEl.textContent = `SELECTED · ${pad(selected.size)} / ${pad(CATEGORIES.length)}`;
    }},
      el('div',{class:'cat-num'}, pad(i+1)),
      el('div',{class:'checkbox', html:'<svg width="10" height="10" viewBox="0 0 11 11" fill="none"><path d="M2 5.5L4.5 8L9 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'}),
      el('div',{},
        el('div',{class:'cat-name'}, c.name),
        el('div',{class:'cat-desc'}, c.desc)
      )
    );
    grid.appendChild(item);
  });
  wrap.appendChild(grid);

  wrap.appendChild(el('div',{style:'margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap'},
    countEl,
    el('button',{class:'btn', onclick:async ()=>{
      if(selected.size===0){ toast('1개 이상 선택해주세요'); return; }
      state.user.categories = [...selected];
      await saveState();
      state.view = 'home'; render();
      toast('설정 완료 — 내일 아침 첫 메일이 도착합니다');
    }}, '시작하기  →')
  ));

  wrap.appendChild(sheetFoot({sheetNo:'A-000-WC', title:'WELCOME'}));
  return wrap;
}


function viewFindId(){
  const wrap = el('div',{class:'auth-wrap'});
  const card = el('div',{class:'auth-card'});
  card.appendChild(el('div',{class:'auth-brand'},'ARCHI · DAILY BRIEF'));
  card.appendChild(el('div',{class:'auth-title'},'아이디 찾기'));
  card.appendChild(el('div',{class:'auth-sub'},'가입 시 입력한 이름으로 이메일을 찾아드립니다.'));

  const nameIn = el('input',{type:'text',required:'',placeholder:'이름 또는 닉네임',maxlength:'30'});
  const resultBox = el('div',{class:'auth-note', style:'display:none;margin-top:14px'});

  const form = el('form',{onsubmit:async (e)=>{
    e.preventDefault();
    const name = nameIn.value.trim();
    if (!name) { toast('이름을 입력하세요'); return; }
    resultBox.style.display = 'none';
    resultBox.innerHTML = '';
    try {
      const r = await fetch('/api/find-id?name=' + encodeURIComponent(name));
      const j = await r.json();
      resultBox.style.display = 'block';
      if (j.found === 0) {
        resultBox.appendChild(document.createTextNode('해당 이름으로 가입된 계정이 없어요.'));
      } else {
        resultBox.appendChild(el('div',{},
          el('strong',{},'찾은 계정 ' + j.found + '건:')
        ));
        for (const r of j.results) {
          resultBox.appendChild(el('div',{style:'margin-top:6px'},
            r.name + ' · ',
            el('span',{class:'mono'}, r.masked)
          ));
        }
      }
    } catch (e) {
      toast('조회 실패: ' + e.message);
    }
  }});
  form.appendChild(el('div',{class:'field'}, el('label',{},'NAME'), nameIn));
  form.appendChild(el('div',{class:'auth-cta'},
    el('button',{class:'btn',type:'submit'},'찾기')
  ));
  card.appendChild(form);
  card.appendChild(resultBox);

  card.appendChild(el('div',{class:'auth-links'},
    el('a',{onclick:()=>{ state.view='login'; render(); }},'← 로그인'),
    el('a',{onclick:()=>{ state.view='find-pw'; render(); }},'비밀번호 찾기')
  ));
  wrap.appendChild(card);
  return wrap;
}

function viewFindPw(){
  const wrap = el('div',{class:'auth-wrap'});
  const card = el('div',{class:'auth-card'});
  card.appendChild(el('div',{class:'auth-brand'},'ARCHI · DAILY BRIEF'));
  card.appendChild(el('div',{class:'auth-title'},'비밀번호 찾기'));
  card.appendChild(el('div',{class:'auth-sub'},'가입한 이메일로 비밀번호 재설정 링크를 보내드립니다.'));

  const emailIn = el('input',{type:'email',required:'',autocomplete:'email',placeholder:'you@example.com'});
  const note = el('div',{class:'auth-note', style:'display:none;margin-top:14px'});

  const form = el('form',{onsubmit:async (e)=>{
    e.preventDefault();
    const email = emailIn.value.trim().toLowerCase();
    if (!/^\S+@\S+\.\S+$/.test(email)) { toast('이메일 형식 확인'); return; }
    toast('전송 중...');
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: location.origin + '/?recovery=1'
    });
    if (error) { toast(error.message || '전송 실패'); return; }
    note.style.display = 'block';
    note.textContent = '재설정 링크를 ' + email + ' 로 보냈어요. 메일의 링크를 클릭하시면 새 비밀번호 입력 화면으로 이동합니다.';
  }});

  form.appendChild(el('div',{class:'field'}, el('label',{},'EMAIL'), emailIn));
  form.appendChild(el('div',{class:'auth-cta'},
    el('button',{class:'btn',type:'submit'},'재설정 메일 보내기')
  ));
  card.appendChild(form);
  card.appendChild(note);

  card.appendChild(el('div',{class:'auth-links'},
    el('a',{onclick:()=>{ state.view='login'; render(); }},'← 로그인'),
    el('a',{onclick:()=>{ state.view='find-id'; render(); }},'아이디 찾기')
  ));
  wrap.appendChild(card);

}

function viewResetPw(){
  const wrap = el('div',{class:'auth-wrap'});
  const card = el('div',{class:'auth-card'});
  card.appendChild(el('div',{class:'auth-brand'},'ARCHI · DAILY BRIEF'));
  card.appendChild(el('div',{class:'auth-title'},'비밀번호 재설정'));
  card.appendChild(el('div',{class:'auth-sub'},'새 비밀번호를 입력하세요. (8자 이상)'));

  const pw1 = el('input',{type:'password',required:'',autocomplete:'new-password',placeholder:'새 비밀번호',minlength:'8'});
  const pw2 = el('input',{type:'password',required:'',autocomplete:'new-password',placeholder:'비밀번호 확인',minlength:'8'});

  const form = el('form',{onsubmit:async (e)=>{
    e.preventDefault();
    if (pw1.value.length < 8) { toast('8자 이상이어야 해요'); return; }
    if (pw1.value !== pw2.value) { toast('비밀번호가 일치하지 않아요'); return; }
    const { error } = await supabase.auth.updateUser({ password: pw1.value });
    if (error) { toast(error.message || '재설정 실패'); return; }
    toast('비밀번호가 변경됐어요');
    state.recovering = false;
    state.view = 'home';
    await hydrateFromSupabase();
  }});

  form.appendChild(el('div',{class:'field'}, el('label',{},'NEW PASSWORD'), pw1));
  form.appendChild(el('div',{class:'field'}, el('label',{},'CONFIRM'), pw2));
  form.appendChild(el('div',{class:'auth-cta'},
    el('button',{class:'btn',type:'submit'},'비밀번호 변경')
  ));
  card.appendChild(form);
  wrap.appendChild(card);
  return wrap;
}

async function logout(){
  await supabase.auth.signOut();
  state.user = null; state.profile = null; state.archive = []; state.view = 'login';
  render(); toast('로그아웃되었어요');
}
